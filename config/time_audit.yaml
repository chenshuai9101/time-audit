# 时间审计 v2 — 本地 LLM 行为分析中间件配置

screenpipe:
  db_path: ""             # 留空自动搜索 ~/.screenpipe/db/screenpipe.db 等位置
  auto_discover: true

analysis:
  lookback_days: 14
  # 会话切分：相邻事件间隔超过该值视为新会话
  session_gap_seconds: 300
  # 同一窗口内连续 OCR 文本相似度高于该阈值视为重复，丢弃
  dedupe_similarity: 0.85
  # 单个会话最多保留多少帧（超过则采样首/中/尾 + 高熵帧）
  max_frames_per_session: 12
  # 单条 OCR 文本截断长度（喂给 LLM 前）
  max_ocr_chars: 240
  # 一批投喂给 LLM 的最大会话数（避免超 context）
  sessions_per_batch: 25

llm:
  enabled: true
  provider: "ollama"                    # ollama（本地，默认） | openai（云端，OpenAI 兼容）

  # --- 本地 Ollama（provider=ollama 时生效，隐私优先，数据不离机）---
  endpoint: "http://localhost:11434"
  model: "qwen2.5:7b"                   # 你本机已装的模型；如装了 14b/32b 改这里

  # --- 云端（provider=openai 时生效，⚠️ 数据会离开本机）---
  # 一个 OpenAI 兼容配置即可对接 DeepSeek / 通义 Qwen API / OpenAI / Moonshot / OpenRouter 等。
  # api_key 绝不写在这里，只从环境变量读，避免泄漏进 git。
  cloud:
    base_url: "https://api.deepseek.com/v1"   # 例：DeepSeek。OpenAI 用 https://api.openai.com/v1
    model: "deepseek-chat"
    api_key_env: "TIME_AUDIT_API_KEY"         # 运行前：export TIME_AUDIT_API_KEY=sk-...
    json_mode: true                            # 端点不支持 response_format 时设 false

  timeout_seconds: 600
  temperature: 0.2
  # 失败时是否回退到 dry-run（仅输出压缩后的 sessions）
  fallback_to_dryrun: true

  # 三层分析的开关
  analyze_points: true                  # 点：单次低效动作
  analyze_lines: true                   # 线：跨 app 固定流程
  analyze_surfaces: true                # 面：职业/角色级工作模式

reports:
  output_dir: "~/Desktop/时间审计/reports"
  keep_raw_sessions: true               # 报告内附带压缩后的 sessions（便于调试）

# 多源数据适配器：任意"日常使用中可优化的流程化来源"都可插拔接入。
# 缺省全部启用；也可经 CLI --sources screenpipe,shell 临时收窄。
sources:
  enabled: ["screenpipe", "shell", "claude", "openclaw"]
  shell:
    history_path: ""        # 留空自动找 ~/.zsh_history / ~/.bash_history
  claude:
    projects_dir: ""        # 留空用 ~/.claude/projects（自动跳过 claude-mem 观察者会话）
  openclaw:
    base_dir: ""            # 留空用 ~/.openclaw（best-effort 解析 cron 自动化任务）

# 确定性命令 / 意图挖掘（不依赖 LLM，证据真实、零幻觉）：
# 命令层的重复最直接说明"该做成脚本 / skill"。
command_mining:
  min_command_count: 5      # 单命令重复 ≥ 此值 → 点候选（alias/snippet）
  min_sequence_count: 3     # 命令序列重复 ≥ 此值 → 线候选（脚本/skill）
  min_sequence_len: 2       # 序列最短步数
  max_sequence_len: 5       # 序列最长步数

logging:
  level: "INFO"
  file: "~/Desktop/时间审计/engine.log"
